steps:
  # 1. Build the multi-stage Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/civicpulse:latest',
      '-t', 'gcr.io/$PROJECT_ID/civicpulse:$COMMIT_SHA',
      '.'
    ]

  # 2. Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/civicpulse:latest']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/civicpulse:$COMMIT_SHA']

  # 3. Deploy the container image to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'civicpulse',
      '--image', 'gcr.io/$PROJECT_ID/civicpulse:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--update-env-vars', 'NODE_ENV=production'
    ]

images:
  - 'gcr.io/$PROJECT_ID/civicpulse:latest'
  - 'gcr.io/$PROJECT_ID/civicpulse:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
